services:
  - type: web
    name: trinetra-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trinetra-db
          property: connectionString
      - key: PYTHONPATH
        value: /opt/render/project/src/backend
      - key: PYTHON_VERSION
        value: 3.11.8

databases:
  - name: trinetra-db
    plan: free
